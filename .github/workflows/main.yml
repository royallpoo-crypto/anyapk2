name: Build anyapk APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build debug APK
      run: ./gradlew assembleDebug
      
    - name: Build release APK
      run: ./gradlew assembleRelease
      # Environment variables are commented out since they're not set
      # If you add secrets later, uncomment and configure them
      # env:
      #   STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      #   KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #   KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
    - name: Upload debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: anyapk-debug
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        
    - name: Upload release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: anyapk-release-unsigned
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: warn

  # Optional: Add this job if you want automatic releases when pushing tags
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          anyapk-debug/*.apk
          anyapk-release-unsigned/*.apk
        generate_release_notes: true
